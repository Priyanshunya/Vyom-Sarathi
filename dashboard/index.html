<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VYOM-SARATHI | Tactical ACM</title>
    <style>
        :root {
            --bg: #050914;
            --panel: #0d1326;
            --text: #a0aec0;
            --accent: #00ffcc;
            --warning: #ff3366;
            --nominal: #33ff99;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Consolas', 'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 15px 20px;
            background: var(--panel);
            border-bottom: 1px solid rgba(0, 255, 204, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.2rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .sys-clock { font-size: 0.9rem; color: #fff; }

        .main-container {
            display: flex;
            flex: 1;
            padding: 10px;
            gap: 10px;
        }

        .viz-panel {
            flex: 3;
            background: var(--panel);
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            border-radius: 4px;
            overflow: hidden;
        }

        #orbit-map {
            width: 100%;
            height: 100%;
            display: block;
        }

        .map-overlay {
            position: absolute;
            bottom: 10px;
            left: 10px;
            font-size: 0.8rem;
            pointer-events: none;
        }

        .side-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .data-card {
            background: var(--panel);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 4px;
            flex: 1;
            overflow-y: auto;
        }

        .data-card h3 {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #fff;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 5px;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }

        .val { color: #fff; font-weight: bold; }
        .val.good { color: var(--nominal); }
        .val.bad { color: var(--warning); }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
        }

        th, td {
            text-align: left;
            padding: 6px 4px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        th { color: var(--accent); }
        
        /* custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--accent); }
    </style>
</head>
<body>

    <header>
        <h1>Vyom-Sarathi ACM | Orbital Insight</h1>
        <div class="sys-clock" id="clock">SYS_TIME: --:--:--</div>
    </header>

    <div class="main-container">
        <div class="viz-panel">
            <canvas id="orbit-map"></canvas>
            <div class="map-overlay">
                <span style="color: var(--nominal)">● SAT</span> | 
                <span style="color: var(--warning)">● DEBRIS</span> | 
                <span style="color: var(--accent)">▲ GROUND LINK</span>
            </div>
        </div>

        <div class="side-panel">
            <div class="data-card" style="flex: 0 0 auto;">
                <h3>Fleet Status</h3>
                <div class="metric"><span>Active Sats</span> <span class="val" id="val-sats">--</span></div>
                <div class="metric"><span>Tracked Debris</span> <span class="val" id="val-debris">--</span></div>
                <div class="metric"><span>Active LOS Links</span> <span class="val" id="val-links">--</span></div>
                <div class="metric"><span>Avg Fuel (kg)</span> <span class="val" id="val-fuel">--</span></div>
            </div>

            <div class="data-card">
                <h3>Telemetry Feed</h3>
                <table>
                    <thead>
                        <tr>
                            <th>SAT_ID</th>
                            <th>FUEL</th>
                            <th>STATUS</th>
                            <th>LINK</th>
                        </tr>
                    </thead>
                    <tbody id="sat-table-body">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('orbit-map');
        const ctx = canvas.getContext('2d');
        const clockEl = document.getElementById('clock');
        const tbBody = document.getElementById('sat-table-body');
        
        let simData = { satellites: [], debris_cloud: [], timestamp: "" };
        
        const stations = [
            { id: "GS-001", lat: 13.0333, lon: 77.5167 },
            { id: "GS-002", lat: 78.2297, lon: 15.4077 },
            { id: "GS-003", lat: 35.4266, lon: -116.8900 },
            { id: "GS-004", lat: -53.1500, lon: -70.9167 },
            { id: "GS-005", lat: 28.5450, lon: 77.1926 },
            { id: "GS-006", lat: -77.8463, lon: 166.6682 }
        ];

        function resize() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // lat/lon to canvas x/y
        function proj(lat, lon) {
            const x = (lon + 180) * (canvas.width / 360);
            const y = (90 - lat) * (canvas.height / 180);
            return { x, y };
        }

        function drawMap() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // basic equator/meridian crosshair
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 1;
            const center = proj(0, 0);
            ctx.beginPath();
            ctx.moveTo(0, center.y); ctx.lineTo(canvas.width, center.y);
            ctx.moveTo(center.x, 0); ctx.lineTo(center.x, canvas.height);
            ctx.stroke();

            // terminator line approx
            const timeOffset = Date.now() / 100000; 
            ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
            ctx.beginPath();
            ctx.moveTo(0, canvas.height);
            for (let x = 0; x <= canvas.width; x += 10) {
                const lon = (x / canvas.width) * 360 - 180;
                const termY = canvas.height/2 + Math.sin((lon * Math.PI / 180) + timeOffset) * (canvas.height/4);
                ctx.lineTo(x, termY);
            }
            ctx.lineTo(canvas.width, 0);
            ctx.lineTo(0, 0);
            ctx.fill();

            // base stations
            ctx.fillStyle = 'var(--accent)';
            stations.forEach(gs => {
                const pos = proj(gs.lat, gs.lon);
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y - 4);
                ctx.lineTo(pos.x - 4, pos.y + 4);
                ctx.lineTo(pos.x + 4, pos.y + 4);
                ctx.fill();
            });

            // debris cloud (rects are faster than arcs for 10k+ items)
            ctx.fillStyle = 'rgba(255, 51, 102, 0.6)';
            simData.debris_cloud.forEach(d => {
                const pos = proj(d[1], d[2]);
                ctx.fillRect(pos.x, pos.y, 2, 2);
            });

            // sats & lasers
            let activeLinks = 0;
            let totalFuel = 0;

            simData.satellites.forEach(sat => {
                const pos = proj(sat.lat, sat.lon);
                totalFuel += sat.fuel_kg;

                if (sat.los_active) {
                    activeLinks++;
                    const targetGs = stations.find(s => s.id === sat.linked_station);
                    if (targetGs) {
                        const gsPos = proj(targetGs.lat, targetGs.lon);
                        ctx.strokeStyle = 'rgba(0, 255, 204, 0.5)';
                        ctx.lineWidth = 1.5;
                        ctx.beginPath();
                        
                        // avoid drawing huge lines across the dateline
                        if (Math.abs(pos.x - gsPos.x) < canvas.width / 2) {
                            ctx.moveTo(pos.x, pos.y);
                            ctx.lineTo(gsPos.x, gsPos.y);
                            ctx.stroke();
                        }
                    }
                }

                ctx.fillStyle = sat.fuel_kg < 5.0 ? 'var(--warning)' : 'var(--nominal)';
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, 3, 0, Math.PI * 2);
                ctx.fill();
            });

            // ui updates
            document.getElementById('val-sats').innerText = simData.satellites.length;
            document.getElementById('val-debris').innerText = simData.debris_cloud.length;
            document.getElementById('val-links').innerText = activeLinks;
            
            if (simData.satellites.length > 0) {
                const avgF = (totalFuel / simData.satellites.length).toFixed(2);
                document.getElementById('val-fuel').innerText = avgF;
                document.getElementById('val-fuel').className = avgF < 10.0 ? 'val bad' : 'val good';
            }
        }

        function updateTable() {
            tbBody.innerHTML = '';
            // bubble low fuel to the top
            const sortedSats = [...simData.satellites].sort((a,b) => a.fuel_kg - b.fuel_kg);
            
            sortedSats.forEach(sat => {
                const tr = document.createElement('tr');
                const fuelColor = sat.fuel_kg < 5.0 ? 'color: var(--warning)' : 'color: var(--nominal)';
                const linkColor = sat.los_active ? 'color: var(--accent)' : 'color: #555';
                
                tr.innerHTML = `
                    <td>${sat.id.substring(0, 8)}</td>
                    <td style="${fuelColor}">${sat.fuel_kg.toFixed(2)}</td>
                    <td>${sat.status}</td>
                    <td style="${linkColor}">${sat.linked_station}</td>
                `;
                tbBody.appendChild(tr);
            });
        }

        // 1Hz poller
        async function fetchTelemetry() {
            try {
                const res = await fetch('http://localhost:8000/api/visualization/snapshot');
                if (res.ok) {
                    simData = await res.json();
                    clockEl.innerText = `SYS_TIME: ${simData.timestamp}`;
                    drawMap();
                    updateTable();
                }
            } catch (err) {
                console.error("link offline", err);
            }
        }

        setInterval(fetchTelemetry, 1000);
        drawMap();
    </script>
</body>
</html>
